name: Code Quality & TypeScript Checks

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

jobs:
  typescript:
    name: TypeScript Compilation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript (Frontend)
        run: |
          cd frontend
          npx tsc --noEmit
        continue-on-error: true

      - name: Check TypeScript (Backend)
        run: |
          cd backend
          npx tsc --noEmit
        continue-on-error: true

  eslint:
    name: ESLint Code Review
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint Frontend
        run: |
          cd frontend
          npm run lint 2>&1 || true
        continue-on-error: true

  dependency-check:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Audit dependencies
        run: npm audit --production || true

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build || true
        continue-on-error: true
